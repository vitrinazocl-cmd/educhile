<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduChile - Bienvenidos</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Icons: FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #005A9C;
            --secondary: #FF9F1C;
            --white: #FFFFFF;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* Fullscreen Video Background */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .video-container video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.5); /* Oscurecemos el video para que el texto resalte más */
        }

        /* Overlay Content */
        .content-overlay {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1.slogan {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: clamp(1.5rem, 4vw, 3.5rem);
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.8);
            margin-bottom: 50px;
            max-width: 1000px;
            animation: fadeInDown 1.5s ease-out;
        }

        /* Enter Button Styles */
        .btn-enter {
            padding: 18px 60px;
            font-size: 1.5rem;
            font-weight: 800;
            font-family: 'Nunito', sans-serif;
            color: var(--white);
            background: var(--secondary);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(255, 159, 28, 0.5);
            transition: all 0.3s ease;
            animation: fadeInUp 1.5s ease-out 0.5s both;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-enter::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s ease;
        }

        .btn-enter:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 159, 28, 0.8);
            background: #E88E14;
        }

        .btn-enter:hover::before {
            left: 100%;
        }

        /* Social Icons */
        .social-icons {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            animation: fadeInUp 1.5s ease-out 0.8s both;
        }

        .social-icons a {
            color: var(--white);
            font-size: 2rem;
            transition: all 0.3s ease;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
        }

        .social-icons a:hover {
            transform: translateY(-5px) scale(1.1);
            color: var(--secondary);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Video Background -->
    <div class="video-container">
        <!-- El video se reproduce en silencio (muted), en loop y sin controles -->
        <video autoplay muted loop playsinline>
            <!-- Usamos el archivo de video solicitado, asegurando que el espacio se lea correctamente -->
            <source src="video%20educacion.mp4" type="video/mp4">
            Tu navegador no soporta videos en HTML5.
        </video>
    </div>

    <!-- Overlay Content -->
    <div class="content-overlay">
        <!-- Título principal -->
        <h1 class="slogan">BIENVENID@S A LA EDUCACIÓN DEL FUTURO</h1>
        
        <!-- Botón que redirige a la página principal -->
        <a href="clasesonline.html" class="btn-enter">ENTRAR</a>

        <!-- Redes Sociales -->
        <div class="social-icons">
            <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
            <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" aria-label="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="#" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
        </div>
    </div>

</body>
</html>
